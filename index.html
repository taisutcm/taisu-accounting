<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>太素记账</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="太素记账">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            background-image: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: 200% 200%;
            animation: gradientAnimation 15s ease infinite;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .balance {
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0;
        }

        .balance-label {
            font-size: 14px;
            opacity: 0.8;
        }

        .tabs {
            display: flex;
            background: #f0f0f0;
            padding: 10px;
            gap: 10px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .content {
            padding: 20px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .file-upload {
            border: 2px dashed #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .file-upload.dragover {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .file-upload p {
            color: #666;
            margin: 10px 0;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .preview-images {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .preview-image {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            border: 2px solid #e0e0e0;
        }

        .transaction-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .transaction-item {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .transaction-item.expense {
            border-left: 4px solid #e74c3c;
        }

        .transaction-item.income {
            border-left: 4px solid #2ecc71;
        }

        .transaction-info {
            flex: 1;
        }

        .transaction-amount {
            font-size: 18px;
            font-weight: bold;
        }

        .transaction-amount.expense {
            color: #e74c3c;
        }

        .transaction-amount.income {
            color: #2ecc71;
        }

        .transaction-category {
            font-size: 14px;
            color: #666;
        }

        .transaction-date {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .transaction-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .btn-view-pdf {
            background: #667eea;
            color: white;
        }

        .export-section {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }

        .success-message {
            background: #2ecc71;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .category-list {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .category-item:last-child {
            margin-bottom: 0;
        }

        .category-name {
            font-weight: 600;
            color: #333;
        }

        .category-delete {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .category-delete:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>太素记账</h1>
            <p class="balance-label">总余额</p>
            <div class="balance">¥<span id="totalBalance">0.00</span></div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showPage('list')">记录</button>
            <button class="tab" onclick="showPage('add')">添加</button>
            <button class="tab" onclick="showPage('export')">导出</button>
            <button class="tab" onclick="showPage('settings')">设置</button>
        </div>

        <div class="content">
            <div id="successMessage" class="success-message"></div>
            <div id="errorMessage" class="error-message"></div>

            <!-- 记录列表页面 -->
            <div id="listPage" class="page active">
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="totalIncome">¥0.00</div>
                        <div class="stat-label">总收入</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="totalExpense">¥0.00</div>
                        <div class="stat-label">总支出</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="transactionCount">0</div>
                        <div class="stat-label">记录数</div>
                    </div>
                </div>

                <div id="transactionList" class="transaction-list"></div>
            </div>

            <!-- 添加记录页面 -->
            <div id="addPage" class="page">
                <form id="transactionForm">
                    <div class="form-group">
                        <label>类型</label>
                        <select id="transactionType" required onchange="updateCategories()">
                            <option value="expense">支出</option>
                            <option value="income">收入</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>金额</label>
                        <input type="number" id="amount" step="0.01" min="0" required placeholder="0.00">
                    </div>

                    <div class="form-group">
                        <label>分类</label>
                        <select id="category" required></select>
                    </div>

                    <div class="form-group">
                        <label>日期</label>
                        <input type="date" id="date" required>
                    </div>

                    <div class="form-group">
                        <label>备注</label>
                        <textarea id="note" placeholder="添加备注..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>上传小票图片</label>
                        <div class="file-upload" onclick="document.getElementById('receiptImages').click()">
                            <p>点击选择图片或拖拽到此处</p>
                            <input type="file" id="receiptImages" accept="image/*" multiple onchange="previewImages(this.files)">
                        </div>
                        <div class="preview-images" id="previewImages"></div>
                    </div>

                    <button type="submit" class="btn btn-primary">保存记录</button>
                </form>
            </div>

            <!-- 导出页面 -->
            <div id="exportPage" class="page">
                <div class="export-section">
                    <h3>导出数据</h3>
                    <p style="margin: 10px 0; color: #666;">选择导出格式和时间范围</p>

                    <div class="form-group">
                        <label>时间范围</label>
                        <select id="exportRange">
                            <option value="month">本月</option>
                            <option value="quarter">本季度</option>
                            <option value="year">今年</option>
                            <option value="all">全部</option>
                        </select>
                    </div>

                    <div class="export-buttons">
                        <button class="btn btn-primary" onclick="exportToExcel()">导出 Excel</button>
                        <button class="btn btn-secondary" onclick="exportToPDF()">导出 PDF</button>
                    </div>
                </div>
            </div>

            <!-- 设置页面 -->
            <div id="settingsPage" class="page">
                <h3 style="margin-bottom: 20px;">分类管理</h3>

                <div class="form-group">
                    <label>添加自定义分类</label>
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <select id="newCategoryType" style="flex: 1;">
                            <option value="expense">支出</option>
                            <option value="income">收入</option>
                        </select>
                        <input type="text" id="newCategoryName" placeholder="输入分类名称" style="flex: 2;">
                        <button class="btn btn-primary" style="width: auto; padding: 12px 20px;" onclick="addCustomCategory()">添加</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>支出分类</label>
                    <div id="expenseCategories" class="category-list"></div>
                </div>

                <div class="form-group">
                    <label>收入分类</label>
                    <div id="incomeCategories" class="category-list"></div>
                </div>

                <button class="btn btn-secondary" onclick="resetCategories()" style="margin-top: 20px;">恢复默认分类</button>
            </div>
        </div>
    </div>

    <script>
        // 数据存储
        let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');

        // 默认分类配置
        const defaultCategories = {
            expense: ['餐饮', '交通', '购物', '娱乐', '医疗', '教育', '住房', '其他'],
            income: ['工资', '奖金', '投资', '兼职', '其他']
        };

        // 分类配置（从本地存储加载或使用默认）
        let categories = JSON.parse(localStorage.getItem('categories') || JSON.stringify(defaultCategories));

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateCategories();
            setDefaultDate();
            loadTransactions();
            loadCategoryLists();
        });

        // 显示页面
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

            document.getElementById(page + 'Page').classList.add('active');
            event.target.classList.add('active');

            if (page === 'list') {
                loadTransactions();
            }
        }

        // 更新分类选项
        function updateCategories() {
            const type = document.getElementById('transactionType').value;
            const categorySelect = document.getElementById('category');
            categorySelect.innerHTML = '';

            categories[type].forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                categorySelect.appendChild(option);
            });
        }

        // 设置默认日期
        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
        }

        // 图片预览
        function previewImages(files) {
            const previewContainer = document.getElementById('previewImages');
            previewContainer.innerHTML = '';

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-image';
                    previewContainer.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        // 保存记录
        document.getElementById('transactionForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const transaction = {
                id: Date.now(),
                type: document.getElementById('transactionType').value,
                amount: parseFloat(document.getElementById('amount').value),
                category: document.getElementById('category').value,
                date: document.getElementById('date').value,
                note: document.getElementById('note').value,
                createdAt: new Date().toISOString()
            };

            transactions.unshift(transaction);
            saveTransactions();
            showMessage('记录添加成功！', 'success');

            // 重置表单
            this.reset();
            setDefaultDate();
            updateCategories();
            document.getElementById('previewImages').innerHTML = '';
        });

        // 保存到本地存储
        function saveTransactions() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        // 加载记录
        function loadTransactions() {
            const listContainer = document.getElementById('transactionList');
            listContainer.innerHTML = '';

            if (transactions.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <p>暂无记录</p>
                        <p>点击"添加"按钮开始太素记账</p>
                    </div>
                `;
            } else {
                transactions.forEach(transaction => {
                    const item = createTransactionItem(transaction);
                    listContainer.appendChild(item);
                });
            }

            updateStats();
        }

        // 创建记录项
        function createTransactionItem(transaction) {
            const div = document.createElement('div');
            div.className = `transaction-item ${transaction.type}`;

            div.innerHTML = `
                <div class="transaction-info">
                    <div class="transaction-amount ${transaction.type}">
                        ${transaction.type === 'expense' ? '-' : '+'}¥${transaction.amount.toFixed(2)}
                    </div>
                    <div class="transaction-category">${transaction.category}</div>
                    <div class="transaction-date">${formatDate(transaction.date)}</div>
                    ${transaction.note ? `<div style="font-size: 12px; color: #999; margin-top: 3px;">${transaction.note}</div>` : ''}
                </div>
                <div class="transaction-actions">
                    <button class="btn-small btn-delete" onclick="deleteTransaction(${transaction.id})">删除</button>
                </div>
            `;

            return div;
        }

        // 删除记录
        function deleteTransaction(id) {
            if (confirm('确定要删除这条记录吗？')) {
                transactions = transactions.filter(t => t.id !== id);
                saveTransactions();
                loadTransactions();
                showMessage('记录已删除', 'success');
            }
        }

        // 更新统计
        function updateStats() {
            const totalIncome = transactions
                .filter(t => t.type === 'income')
                .reduce((sum, t) => sum + t.amount, 0);

            const totalExpense = transactions
                .filter(t => t.type === 'expense')
                .reduce((sum, t) => sum + t.amount, 0);

            document.getElementById('totalIncome').textContent = `¥${totalIncome.toFixed(2)}`;
            document.getElementById('totalExpense').textContent = `¥${totalExpense.toFixed(2)}`;
            document.getElementById('totalBalance').textContent = (totalIncome - totalExpense).toFixed(2);
            document.getElementById('transactionCount').textContent = transactions.length;
        }

        // 格式化日期
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN');
        }

        // 显示消息
        function showMessage(message, type) {
            const messageEl = type === 'success' ?
                document.getElementById('successMessage') :
                document.getElementById('errorMessage');

            messageEl.textContent = message;
            messageEl.style.display = 'block';

            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 3000);
        }

        // 导出 Excel
        function exportToExcel() {
            const range = document.getElementById('exportRange').value;
            const filteredTransactions = filterTransactionsByRange(range);

            if (filteredTransactions.length === 0) {
                showMessage('没有数据可导出', 'error');
                return;
            }

            // 创建 CSV 内容
            let csv = '日期,类型,分类,金额,备注\n';
            filteredTransactions.forEach(t => {
                csv += `${t.date},${t.type === 'expense' ? '支出' : '收入'},${t.category},${t.amount},"${t.note || ''}"\n`;
            });

            // 下载文件
            downloadFile(csv, `太素记账导出_${new Date().toISOString().split('T')[0]}.csv`, 'text/csv');
            showMessage('导出成功！', 'success');
        }

        // 导出 PDF（简化版，实际需要使用 jsPDF 库）
        function exportToPDF() {
            const range = document.getElementById('exportRange').value;
            const filteredTransactions = filterTransactionsByRange(range);

            if (filteredTransactions.length === 0) {
                showMessage('没有数据可导出', 'error');
                return;
            }

            // 创建打印视图
            let content = '<html><head><title>太素记账记录</title></head><body>';
            content += '<h1>太素记账记录</h1>';
            content += '<table border="1" cellpadding="10" style="border-collapse: collapse; width: 100%;">';
            content += '<tr><th>日期</th><th>类型</th><th>分类</th><th>金额</th><th>备注</th></tr>';

            filteredTransactions.forEach(t => {
                content += `<tr>
                    <td>${t.date}</td>
                    <td>${t.type === 'expense' ? '支出' : '收入'}</td>
                    <td>${t.category}</td>
                    <td style="color: ${t.type === 'expense' ? 'red' : 'green'}">¥${t.amount.toFixed(2)}</td>
                    <td>${t.note || '-'}</td>
                </tr>`;
            });

            content += '</table></body></html>';

            // 打开新窗口打印
            const printWindow = window.open('', '_blank');
            printWindow.document.write(content);
            printWindow.document.close();
            printWindow.print();

            showMessage('已打开打印窗口，请选择"保存为 PDF"', 'success');
        }

        // 按时间范围筛选
        function filterTransactionsByRange(range) {
            const now = new Date();
            const startDate = new Date();

            switch (range) {
                case 'month':
                    startDate.setDate(1);
                    startDate.setHours(0, 0, 0, 0);
                    break;
                case 'quarter':
                    const quarter = Math.floor(now.getMonth() / 3);
                    startDate.setMonth(quarter * 3);
                    startDate.setDate(1);
                    break;
                case 'year':
                    startDate.setMonth(0);
                    startDate.setDate(1);
                    break;
                case 'all':
                default:
                    return transactions;
            }

            return transactions.filter(t => new Date(t.date) >= startDate);
        }

        // 下载文件
        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type: type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        // === 分类管理功能 ===

        // 加载分类列表
        function loadCategoryLists() {
            const expenseContainer = document.getElementById('expenseCategories');
            const incomeContainer = document.getElementById('incomeCategories');

            expenseContainer.innerHTML = '';
            incomeContainer.innerHTML = '';

            // 渲染支出分类
            categories.expense.forEach(cat => {
                const item = createCategoryItem(cat, 'expense');
                expenseContainer.appendChild(item);
            });

            // 渲染收入分类
            categories.income.forEach(cat => {
                const item = createCategoryItem(cat, 'income');
                incomeContainer.appendChild(item);
            });
        }

        // 创建分类项
        function createCategoryItem(name, type) {
            const div = document.createElement('div');
            div.className = 'category-item';
            div.innerHTML = `
                <span class="category-name">${name}</span>
                <button class="category-delete"
                        onclick="deleteCategory('${type}', '${name}')">
                    删除
                </button>
            `;
            return div;
        }

        // 添加自定义分类
        function addCustomCategory() {
            const type = document.getElementById('newCategoryType').value;
            const name = document.getElementById('newCategoryName').value.trim();

            if (!name) {
                showMessage('请输入分类名称', 'error');
                return;
            }

            if (categories[type].includes(name)) {
                showMessage('该分类已存在', 'error');
                return;
            }

            categories[type].push(name);
            saveCategories();
            loadCategoryLists();
            updateCategories();

            document.getElementById('newCategoryName').value = '';
            showMessage('分类添加成功！', 'success');
        }

        // 删除分类
        function deleteCategory(type, name) {
            if (!confirm(`确定要删除"${name}"分类吗？`)) {
                return;
            }

            // 检查是否有记录使用此分类
            const hasRecords = transactions.some(t => t.type === type && t.category === name);
            if (hasRecords) {
                if (!confirm(`"${name}"分类下有记录，删除后这些记录将无法显示分类，确定要删除吗？`)) {
                    return;
                }
            }

            categories[type] = categories[type].filter(c => c !== name);
            saveCategories();
            loadCategoryLists();
            updateCategories();
            showMessage('分类已删除', 'success');
        }

        // 恢复默认分类
        function resetCategories() {
            if (!confirm('确定要恢复默认分类吗？这将删除所有自定义分类。')) {
                return;
            }

            categories = {
                expense: [...defaultCategories.expense],
                income: [...defaultCategories.income]
            };
            saveCategories();
            loadCategoryLists();
            updateCategories();
            showMessage('已恢复默认分类', 'success');
        }

        // 保存分类到本地存储
        function saveCategories() {
            localStorage.setItem('categories', JSON.stringify(categories));
        }

        // 按回车键添加分类
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.id === 'newCategoryName') {
                addCustomCategory();
            }
        });
    </script>
</body>
</html>
